<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hausübung – DOM-Manipulation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #11151c;
    --panel: #1a212c;
    --panel-2: #202935;
    --border: #2b3544;
    --text: #e7ebf1;
    --muted: #8b96a8;
    --amber: #ffb86b;
    --cyan: #7dd3fc;
    --green: #8fd19e;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: radial-gradient(circle at top left, #161c26, var(--bg) 60%);
    color: var(--text);
    font-family: var(--sans);
    padding: 40px 16px;
    min-height: 100vh;
  }
  .editor{
    max-width: 720px;
    margin: 0 auto;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,.6);
  }
  .titlebar{
    display:flex;
    align-items:center;
    gap:8px;
    padding: 12px 16px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
  }
  .dot{ width:10px; height:10px; border-radius:50%; }
  .dot.r{ background:#ff5f57; }
  .dot.y{ background:#febc2e; }
  .dot.g{ background:#28c840; }
  .filename{
    margin-left: 10px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
  }
  main{ padding: 28px 24px 36px; background: var(--panel); }
  h1{
    font-family: var(--mono);
    font-size: 22px;
    margin: 0 0 4px;
    transition: color .25s ease;
  }
  .subtitle{ color: var(--muted); font-size: 13px; margin: 0 0 28px; }
  .task{
    border-top: 1px dashed var(--border);
    padding-top: 22px;
    margin-top: 22px;
  }
  .task:first-of-type{ border-top:none; margin-top:0; padding-top:0; }
  .comment{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--green);
    margin: 0 0 14px;
  }
  .row{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .readout{
    font-family: var(--mono);
    font-size: 26px;
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    min-width: 56px;
    text-align:center;
  }
  .readout::after{
    content:"";
    display:inline-block;
    width:2px; height:1em;
    background: var(--amber);
    margin-left:6px;
    vertical-align:-2px;
    animation: blink 1.1s step-end infinite;
  }
  @media (prefers-reduced-motion: reduce){ .readout::after{ animation:none; } }
  @keyframes blink{ 50%{ opacity:0; } }
  button{
    font-family: var(--mono);
    font-size: 14px;
    color: var(--bg);
    background: var(--amber);
    border: none;
    border-radius: 6px;
    padding: 9px 16px;
    cursor:pointer;
    transition: transform .12s ease, filter .12s ease;
  }
  button:hover{ filter: brightness(1.08); }
  button:active{ transform: scale(.96); }
  button:focus-visible{ outline: 2px solid var(--cyan); outline-offset:2px; }
  button.secondary{ background: var(--panel-2); color: var(--text); border:1px solid var(--border); }
  button.alt{ background: var(--cyan); }
  .colorbox{
    width: 100%;
    height: 60px;
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-top: 14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: var(--mono);
    font-size: 13px;
    background: #2a3340;
    color: rgba(255,255,255,.7);
    transition: background .2s ease, color .2s ease;
  }
  .badge{
    display:inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing:.03em;
    color: var(--cyan);
    border: 1px solid var(--cyan);
    border-radius: 999px;
    padding: 2px 9px;
    margin-left: 8px;
  }
  .hint{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin: 12px 0 0;
  }
</style>
</head>
<body>
  <div class="editor">
    <div class="titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="filename">hausuebung-18-03-2026.js</span>
    </div>
    <main>
      <h1 id="ueberschrift">DOM-Manipulation</h1>
      <p class="subtitle">Hausübung vom 18. März 2026</p>

      <section class="task">
        <p class="comment">// Aufgabe 1 — Zähler mit Anzeige</p>
        <div class="row">
          <div class="readout" id="counter">0</div>
          <button onclick="erhoehen()">+</button>
          <button onclick="verringern()">-</button>
          <button class="secondary" onclick="reset()">RESET</button>
        </div>
      </section>

      <section class="task">
        <p class="comment">// Aufgabe 2 — Zufallsfarbe</p>
        <div class="row">
          <button class="alt" onclick="zufallsfarbe()">ZUFALL</button>
        </div>
        <div class="colorbox" id="colorbox">rgb(42, 51, 64)</div>
      </section>

      <section class="task">
        <p class="comment">// Aufgabe 3 — gleicher Zähler, ohne onclick<span class="badge">addEventListener</span></p>
        <div class="row">
          <div class="readout" id="counter2">0</div>
          <button id="plusBtn">+</button>
          <button id="minusBtn">-</button>
          <button class="secondary" id="resetBtn">RESET</button>
        </div>
        <p class="hint">kein onclick im HTML — Listener werden unten per addEventListener() gesetzt</p>
      </section>
    </main>
  </div>

<script>
  // ---------- Aufgabe 1: Zähler mit onclick-Attribut im HTML ----------
  let zaehler = 0;
  const counterEl = document.getElementById('counter');

  function erhoehen(){
    zaehler++;
    counterEl.textContent = zaehler;
  }
  function verringern(){
    zaehler--;
    counterEl.textContent = zaehler;
  }
  function reset(){
    zaehler = 0;
    counterEl.textContent = zaehler;
  }

  // ---------- Aufgabe 2: Zufallsfarbe mit Math.random() ----------
  const ueberschrift = document.getElementById('ueberschrift');
  const colorbox = document.getElementById('colorbox');

  function zufallsfarbe(){
    const r = Math.floor(Math.random() * 256);
    const g = Math.floor(Math.random() * 256);
    const b = Math.floor(Math.random() * 256);
    const farbe = `rgb(${r}, ${g}, ${b})`;

    ueberschrift.style.color = farbe;
    colorbox.style.background = farbe;
    colorbox.textContent = farbe;

    // Textfarbe in der Box je nach Helligkeit anpassen, damit sie lesbar bleibt
    const helligkeit = (r * 299 + g * 587 + b * 114) / 1000;
    colorbox.style.color = helligkeit > 150 ? 'rgba(0,0,0,.6)' : 'rgba(255,255,255,.85)';
  }

  // ---------- Aufgabe 3: gleiche Funktionalität wie Aufgabe 1, aber ohne onclick ----------
  // Statt onclick="..." im HTML verwenden wir addEventListener() im Skript.
  let zaehler2 = 0;
  const counter2El = document.getElementById('counter2');

  document.getElementById('plusBtn').addEventListener('click', () => {
    zaehler2++;
    counter2El.textContent = zaehler2;
  });

  document.getElementById('minusBtn').addEventListener('click', () => {
    zaehler2--;
    counter2El.textContent = zaehler2;
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    zaehler2 = 0;
    counter2El.textContent = zaehler2;
  });
</script>
</body>
</html>
